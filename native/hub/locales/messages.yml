error.registry_not_found:
  en: "Registry not found: %{error}"
  zh: "找不到書源目錄：%{error}"
error.registry_parse:
  en: "Registry parse error: %{message}"
  zh: "書源目錄格式錯誤：%{message}"
error.feed_not_found:
  en: "Feed not found: %{id}"
  zh: "找不到書源：%{id}"
error.duplicate_feed_id:
  en: "Duplicate feed ID: %{id}"
  zh: "重複的書源 ID：%{id}"
error.domain_not_allowed:
  en: "Domain not allowed: %{url} (allowed: %{allowed})"
