_version: 2
error.lua:
  en: "Lua script error: %{error}"
  zh: "Lua 腳本錯誤：%{error}"
error.http:
  en: "HTTP request failed: %{error}"
  zh: "網絡請求失敗：%{error}"
error.missing_function:
  en: "Missing required function: %{name}"
  zh: "缺少必要函數：%{name}"
error.invalid_feed:
  en: "Invalid feed metadata: %{message}"
  zh: "書源元數據無效：%{message}"
error.script_parse:
  en: "Script parse error at line %{line}: %{message}"
  zh: "腳本解析錯誤（第 %{line} 行）：%{message}"
error.registry_not_found:
  en: "Registry not found: %{error}"
  zh: "找不到書源目錄：%{error}"
error.registry_parse:
  en: "Registry parse error: %{message}"
  zh: "書源目錄格式錯誤：%{message}"
error.feed_not_found:
  en: "Feed not found: %{id}"
  zh: "找不到書源：%{id}"
error.duplicate_feed_id:
  en: "Duplicate feed ID: %{id}"
  zh: "重複的書源 ID：%{id}"
error.domain_not_allowed:
  en: "Domain not allowed: %{url} (allowed: %{allowed})"
  zh: "域名未授權：%{url}（允許：%{allowed}）"
error.registry_write:
  en: "Failed to write registry: %{error}"
  zh: "寫入書源目錄失敗：%{error}"
error.storage:
  en: "Failed to %{operation} %{target}: %{message}"
  zh: "%{target}%{operation}失敗：%{message}"
error.format:
  en: "Failed to %{operation} %{target}: %{message}"
  zh: "%{target}%{operation}失敗：%{message}"
error.cache_schema_mismatch:
  en: "Chapter cache schema mismatch for %{feed_id}/%{book_id}/%{chapter_id}: cached=%{cached_version}, expected=%{expected_version}"
  zh: "章節緩存版本不匹配：%{feed_id}/%{book_id}/%{chapter_id}，緩存版本 %{cached_version}，期望版本 %{expected_version}"
error.cache_key_mismatch:
  en: "Chapter cache key mismatch for %{expected_feed_id}/%{expected_book_id}/%{expected_chapter_id}: found %{actual_feed_id}/%{actual_book_id}/%{actual_chapter_id}"
  zh: "章節緩存鍵不匹配：期望 %{expected_feed_id}/%{expected_book_id}/%{expected_chapter_id}，實際為 %{actual_feed_id}/%{actual_book_id}/%{actual_chapter_id}"
error.registry_schema_too_new:
  en: "Registry schema version %{file_version} is newer than supported version %{supported_version}. Please update the app."
  zh: "書源目錄架構版本 %{file_version} 高於支持的版本 %{supported_version}，請更新應用。"
error.feed_schema_too_new:
  en: "Feed '%{feed_id}' requires schema version %{file_version}, but only version %{supported_version} is supported. Please update the app."
  zh: "書源「%{feed_id}」需要架構版本 %{file_version}，但僅支持版本 %{supported_version}，請更新應用。"
error.auth_status_not_supported:
  en: "Feed '%{feed_id}' does not support auth status check."
  zh: "書源「%{feed_id}」不支持登錄狀態檢查。"
