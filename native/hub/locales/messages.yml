  zh: "無法讀取文件：%{error}"
error.no_pending_preview:
  en: "No pending preview for this request"
  zh: "找不到對應的預覽記錄"
error.app_data_dir_not_set:
  en: "App data directory not set"
  zh: "應用數據目錄尚未設置"
error.bookshelf_unavailable:
  en: "Bookshelf is unavailable"
  zh: "書架當前不可用"
error.feed_unavailable:
  en: "Feed '%{id}' not found or failed to load"
  zh: "找不到書源「%{id}」或其加載失敗"
error.registry_reload_not_supported:
  en: "Registry reload is not supported at runtime"
  zh: "運行時不支持重新加載書源目錄"
